<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
    <rect width="400" height="300" fill="#f8fff0"/>
    <!-- plate -->
    <ellipse cx="200" cy="228" rx="118" ry="20" fill="#e0d8c8" opacity="0.35"/>
    <!-- tart shell shadow -->
    <ellipse cx="202" cy="222" rx="100" ry="16" fill="#c8a050" opacity="0.2"/>
    <!-- tart shell -->
    <circle cx="200" cy="190" r="98" fill="#d4a040"/>
    <circle cx="200" cy="190" r="98" fill="url(#shellgrad)"/>
    <!-- pastry rim flute pattern -->
    <circle cx="200" cy="190" r="98" fill="none" stroke="#b88020" stroke-width="14" stroke-dasharray="8 6"/>
    <!-- crème patissière -->
    <circle cx="200" cy="190" r="82" fill="#f5e8a0"/>
    <circle cx="200" cy="190" r="82" fill="url(#cremgrad)"/>
    <!-- fruit arrangement -->
    <!-- strawberries -->
    <path d="M200 158 Q212 148 218 162 Q212 172 200 168 Q188 172 182 162 Q188 148 200 158Z" fill="#e83030"/>
    <path d="M200 148 L203 144" stroke="#4a8a1a" stroke-width="2"/>
    <!-- kiwi slices -->
    <circle cx="168" cy="178" r="16" fill="#4aaa2a"/>
    <circle cx="168" cy="178" r="11" fill="#d4f0a0"/>
    <circle cx="168" cy="178" r="5" fill="#e8f8c0"/>
    <line x1="168" y1="162" x2="168" y2="194" stroke="#2a7a0a" stroke-width="1" opacity="0.4"/>
    <line x1="152" y1="178" x2="184" y2="178" stroke="#2a7a0a" stroke-width="1" opacity="0.4"/>
    <!-- blueberries -->
    <circle cx="232" cy="175" r="10" fill="#4a3a8a"/>
    <circle cx="246" cy="183" r="9" fill="#5a4a9a"/>
    <circle cx="234" cy="193" r="8" fill="#4a3a8a"/>
    <!-- raspberries -->
    <circle cx="175" cy="202" r="9" fill="#e03060"/>
    <circle cx="165" cy="196" r="8" fill="#c82850"/>
    <!-- glaze shine -->
    <circle cx="200" cy="190" r="82" fill="url(#glazegrad)" opacity="0.3"/>
    <defs>
      <radialGradient id="shellgrad" cx="40%" cy="35%"><stop offset="0%" stop-color="#f0c060" stop-opacity="0.4"/><stop offset="100%" stop-color="#000" stop-opacity="0.05"/></radialGradient>
      <radialGradient id="cremgrad" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity="0.5"/><stop offset="100%" stop-color="#e0c040" stop-opacity="0.1"/></radialGradient>
      <radialGradient id="glazegrad" cx="40%" cy="30%"><stop offset="0%" stop-color="#fff" stop-opacity="0.4"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
    </defs>
    <text x="200" y="258" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#5a6a20" font-weight="bold">Fruit Tart</text>
  </svg>