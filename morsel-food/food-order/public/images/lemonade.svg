<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
    <rect width="400" height="300" fill="#fffff0"/>
    <!-- glass shadow -->
    <ellipse cx="200" cy="242" rx="52" ry="10" fill="#c8c030" opacity="0.2"/>
    <!-- glass body -->
    <path d="M152 100 L162 235 Q200 245 238 235 L248 100 Z" fill="#e8f8e0" opacity="0.4"/>
    <path d="M152 100 L162 235 Q200 245 238 235 L248 100 Z" fill="url(#glassgrad)" opacity="0.3"/>
    <!-- lemonade liquid -->
    <path d="M155 140 L163 235 Q200 244 237 235 L245 140 Z" fill="#f0e840" opacity="0.7"/>
    <path d="M155 140 L163 235 Q200 244 237 235 L245 140 Z" fill="url(#lemongrad)"/>
    <!-- ice cubes -->
    <rect x="175" y="170" width="25" height="25" rx="4" fill="white" opacity="0.6"/>
    <rect x="202" y="180" width="22" height="22" rx="4" fill="white" opacity="0.5"/>
    <rect x="183" y="200" width="20" height="20" rx="4" fill="white" opacity="0.55"/>
    <!-- bubbles -->
    <circle cx="185" cy="160" r="4" fill="white" opacity="0.5"/>
    <circle cx="215" cy="155" r="3" fill="white" opacity="0.4"/>
    <circle cx="200" cy="150" r="3.5" fill="white" opacity="0.45"/>
    <!-- lemon slice on rim -->
    <circle cx="248" cy="108" r="22" fill="#f5e820" stroke="#e0d010" stroke-width="1.5"/>
    <path d="M248 86 L248 130 M226 108 L270 108" stroke="#e0c800" stroke-width="1.2" opacity="0.6"/>
    <circle cx="248" cy="108" r="8" fill="#f0f0a0"/>
    <!-- straw -->
    <rect x="220" y="85" width="8" height="145" rx="4" fill="#f04060" opacity="0.8"/>
    <rect x="221" y="86" width="3" height="143" rx="1.5" fill="#ff8090" opacity="0.4"/>
    <!-- mint sprig -->
    <path d="M175 105 L172 92" stroke="#4a9a2a" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="168" cy="90" rx="8" ry="5" fill="#4aaa2a" transform="rotate(-30,168,90)"/>
    <ellipse cx="175" cy="88" rx="7" ry="4" fill="#5aba3a" transform="rotate(10,175,88)"/>
    <!-- glass outline -->
    <path d="M152 100 L162 235 Q200 245 238 235 L248 100 Z" fill="none" stroke="#a0b840" stroke-width="2" opacity="0.6"/>
    <line x1="152" y1="100" x2="248" y2="100" stroke="#a0b840" stroke-width="2" opacity="0.6"/>
    <defs>
      <linearGradient id="glassgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0.5"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
      <linearGradient id="lemongrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0.2"/><stop offset="100%" stop-color="#c8b000" stop-opacity="0.1"/></linearGradient>
    </defs>
    <text x="200" y="268" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#6a6a10" font-weight="bold">Fresh Lemonade</text>
  </svg>