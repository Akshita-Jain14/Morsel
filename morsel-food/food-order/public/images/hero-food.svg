<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <rect width="600" height="400" fill="transparent"/>
    <!-- large decorative plate -->
    <ellipse cx="300" cy="340" rx="220" ry="45" fill="#e8d8b8" opacity="0.3"/>
    <circle cx="300" cy="230" r="195" fill="#f5efe0" opacity="0.5"/>
    <circle cx="300" cy="230" r="185" fill="#fff8f0" opacity="0.7"/>
    <!-- pizza slice (large, back) -->
    <path d="M300 100 L440 270 Q380 310 300 290 Z" fill="#e8a020" opacity="0.9"/>
    <path d="M300 100 L440 270 Q380 310 300 290 Z" fill="url(#hpgrad)"/>
    <!-- burger stack (right) -->
    <ellipse cx="420" cy="200" rx="55" ry="15" fill="#d4920a" opacity="0.8"/>
    <ellipse cx="420" cy="192" rx="48" ry="12" fill="#e83030" opacity="0.7"/>
    <ellipse cx="420" cy="184" rx="48" ry="11" fill="#f0c030" opacity="0.8"/>
    <ellipse cx="420" cy="175" rx="50" ry="13" fill="#5a2a0a" opacity="0.9"/>
    <path d="M370 173 Q420 158 470 173 Q470 165 420 155 Q370 165 370 173Z" fill="#e8a020"/>
    <!-- bowl of ramen (left) -->
    <path d="M135 235 Q135 290 210 295 Q285 290 285 235 Z" fill="#f5e8d0" opacity="0.8"/>
    <ellipse cx="210" cy="235" rx="75" ry="22" fill="#e05020" opacity="0.75"/>
    <path d="M148 250 Q210 260 272 250" stroke="#f09060" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
    <!-- wine glass (far right) -->
    <path d="M490 140 Q520 180 510 220 L480 220 Q470 180 500 140Z" fill="#f0d0d0" opacity="0.6"/>
    <rect x="493" y="220" width="14" height="50" rx="7" fill="#e0b0b0" opacity="0.5"/>
    <ellipse cx="500" cy="272" rx="22" ry="8" fill="#e0b0b0" opacity="0.4"/>
    <!-- salad leaves (top left) -->
    <ellipse cx="130" cy="140" rx="30" ry="14" fill="#5aaa3a" transform="rotate(-25,130,140)" opacity="0.8"/>
    <ellipse cx="155" cy="128" rx="28" ry="12" fill="#4a9a2a" transform="rotate(10,155,128)" opacity="0.7"/>
    <ellipse cx="110" cy="155" rx="25" ry="11" fill="#6aba4a" transform="rotate(-40,110,155)" opacity="0.7"/>
    <!-- steam lines -->
    <path d="M210 215 Q213 200 210 185" stroke="#ccc" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M300 80 Q303 65 300 50" stroke="#ccc" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
    <defs>
      <radialGradient id="hpgrad" cx="35%" cy="25%"><stop offset="0%" stop-color="#fff" stop-opacity="0.3"/><stop offset="100%" stop-color="#c07000" stop-opacity="0.1"/></radialGradient>
    </defs>
  </svg>