<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
    <rect width="400" height="300" fill="#fff8f0"/>
    <!-- bowl shadow -->
    <ellipse cx="200" cy="225" rx="105" ry="18" fill="#d4a870" opacity="0.25"/>
    <!-- bowl body -->
    <path d="M95 155 Q95 230 200 235 Q305 230 305 155 Z" fill="#f0e8d8"/>
    <path d="M95 155 Q95 230 200 235 Q305 230 305 155 Z" fill="url(#bowlgrad)"/>
    <!-- soup -->
    <ellipse cx="200" cy="155" rx="105" ry="28" fill="#e05a20"/>
    <ellipse cx="200" cy="155" rx="105" ry="28" fill="url(#soupgrad)"/>
    <!-- soup surface ripple -->
    <ellipse cx="185" cy="153" rx="30" ry="8" fill="#f07040" opacity="0.4"/>
    <ellipse cx="225" cy="156" rx="20" ry="6" fill="#f07040" opacity="0.3"/>
    <!-- cream swirl -->
    <path d="M200 148 Q215 143 220 152 Q215 161 200 158 Q185 155 185 148 Q190 141 200 148Z" fill="white" opacity="0.7"/>
    <!-- paprika dust -->
    <circle cx="210" cy="148" r="3" fill="#c03000" opacity="0.6"/>
    <circle cx="196" cy="145" r="2" fill="#c03000" opacity="0.5"/>
    <!-- bread on side -->
    <rect x="290" y="175" width="55" height="35" rx="6" fill="#d4923a"/>
    <rect x="290" y="175" width="55" height="35" rx="6" fill="url(#breadgrad)"/>
    <path d="M290 182 Q317 175 345 182" stroke="#b87020" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- steam -->
    <path d="M170 135 Q173 122 170 110" stroke="#ddd" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M200 130 Q203 117 200 105" stroke="#ddd" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M230 133 Q233 120 230 108" stroke="#ddd" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <defs>
      <linearGradient id="bowlgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.2"/><stop offset="100%" stop-color="#000" stop-opacity="0.05"/></linearGradient>
      <radialGradient id="soupgrad" cx="40%" cy="40%"><stop offset="0%" stop-color="#ff8050" stop-opacity="0.3"/><stop offset="100%" stop-color="#000" stop-opacity="0.05"/></radialGradient>
      <linearGradient id="breadgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.3"/><stop offset="100%" stop-color="#000" stop-opacity="0.1"/></linearGradient>
    </defs>
    <text x="200" y="256" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#8a4820" font-weight="bold">Spiced Soup</text>
  </svg>